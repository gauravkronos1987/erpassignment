version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: ar-module-postgres
    environment:
      POSTGRES_DB: ar_module
      POSTGRES_USER: ar_user
      POSTGRES_PASSWORD: ar_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ar_user -d ar_module"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ar-module-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/ar_module
      DB_USER: ar_user
      DB_PASSWORD: ar_password
    ports:
      - "8080:8080"

volumes:
  pgdata:
